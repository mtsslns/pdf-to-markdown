name: Convertir PDF a Markdown

on:
  push:
    paths:
      - 'input/*.pdf'

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar markitdown
        run: pip install "markitdown[pdf]"

      - name: Convertir PDFs a Markdown
        run: |
          mkdir -p output
          for f in input/*.pdf; do
            nombre=$(basename "$f" .pdf)
            echo "Convirtiendo: $f"
            python -m markitdown "$f" -o "output/${nombre}.md"
          done

      - name: Borrar PDFs del input
        run: rm -f input/*.pdf

      - name: Commit resultado
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add output/*.md || true
          git add input/ || true
          git diff --staged --quiet || git commit -m "PDF convertido a markdown"
          git push
